<div xmlns="http://www.w3.org/1999/html">
  <form [formGroup]="connexionForm">
  <div>
    <label>email :</label>
    <input type="text" formControlName="email" [ngClass]="{'form-control':true}">
  </div>
  <div>
    <label>mot de passe</label>
    <input type="password" formControlName="motDePasse" [ngClass]="{'form-control':true}">
  </div>
  <button (click)="onConnexion()">connexion</button>
  </form>
</div>
